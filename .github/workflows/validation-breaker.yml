name: hermes-validation-breaker
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: validation-breaker
  cancel-in-progress: false

jobs:
  hermes-iter:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout state repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Hermes agent from Nous Research
        run: |
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git /tmp/hermes
          cd /tmp/hermes
          pip install --quiet -e .
          pip install --quiet 'psycopg[binary]'

      - name: Seed Hermes config
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEON_DATABASE_URL:  ${{ secrets.NEON_DATABASE_URL }}
          GH_PAT:             ${{ secrets.GH_PAT }}
        run: |
          mkdir -p ~/.hermes/skills/security/validation-breaker
          cp skills/validation-breaker/SKILL.md ~/.hermes/skills/security/validation-breaker/SKILL.md
          cat > ~/.hermes/.env <<EOF
          OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
          NEON_DATABASE_URL=${NEON_DATABASE_URL}
          GH_PAT=${GH_PAT}
          EOF

      - name: Run Hermes one-shot with validation-breaker skill
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEON_DATABASE_URL:  ${{ secrets.NEON_DATABASE_URL }}
          GH_PAT:             ${{ secrets.GH_PAT }}
        working-directory: /tmp/hermes
        run: |
          timeout 900 python cli.py \
            --query "Run one iteration of the validation-breaker skill. Execute the bash command in the skill file. Do not ask questions." \
            --skills validation-breaker \
            --quiet \
            || echo "hermes exit $?"

      - name: Commit progress
        if: always()
        run: |
          git config user.name  'vb-bot'
          git config user.email 'bot@validation-breaker'
          git add -A
          if git diff --cached --quiet; then
            echo 'no diff this iter'
          else
            git commit -m "hermes iter: $(date -u +%FT%TZ)"
            git push
          fi
