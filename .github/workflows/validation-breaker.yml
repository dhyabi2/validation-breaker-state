name: validation-breaker
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: validation-breaker
  cancel-in-progress: false

jobs:
  iterate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install --quiet 'psycopg[binary]'
      - name: Run iteration
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          NEON_DATABASE_URL:  ${{ secrets.NEON_DATABASE_URL }}
          GH_PAT:             ${{ secrets.GH_PAT }}
          VB_MODEL:           google/gemma-4-31b-it:free
        run: python3 scripts/iterate.py
      - name: Commit progress.log and LATEST.md
        if: always()
        run: |
          git config user.name  'vb-bot'
          git config user.email 'bot@validation-breaker'
          git add -A
          if git diff --cached --quiet; then
            echo 'no diff this iter'
          else
            git commit -m "iter: $(head -1 LATEST.md 2>/dev/null || date -u +iter-%FT%T)"
            git push
          fi
